<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moldura Oficial JEAS 30ª Edição</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.25)),
    url("fundo.png");
  background-size: cover;
  background-position: center;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 18px;
}

.page {
  width: 100%;
  max-width: 520px;
}

.container {
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(10px);
  padding: 34px 28px;
  border-radius: 30px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.16);
  text-align: center;
}

h1 {
  margin: 0 0 14px;
  font-size: 26px;
  line-height: 1.2;
}

p {
  margin: 0 0 28px;
  color: #555;
  font-size: 16px;
  line-height: 1.5;
}

input {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 16px;
  background: #eee;
  margin-bottom: 34px;
  font-size: 15px;
}

.preview-area {
  position: relative;
  width: 100%;
  max-width: 390px;
  aspect-ratio: 1 / 1;
  margin: 0 auto 34px;
}

#canvasQuadradoPreview {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0.22;
  border-radius: 22px;
  z-index: 1;
}

#canvasPreview {
  position: relative;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  cursor: grab;
  z-index: 2;
  box-shadow: 0 14px 35px rgba(0,0,0,0.20);
}

#setaEsquerda,
#setaDireita {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  border: none;
  background: transparent;
  color: #b50000;
  font-size: 68px;
  cursor: pointer;
  z-index: 5;
  font-weight: bold;
  line-height: 1;
}

#setaEsquerda {
  left: -55px;
}

#setaDireita {
  right: -55px;
}

button.download {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 16px;
  background: #111;
  color: white;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
}

button.download:hover {
  background: #333;
}

#canvasFinal {
  display: none;
}

@media (max-width: 520px) {
  body {
    align-items: flex-start;
    padding: 34px 18px 80px;
  }

  .container {
    padding: 34px 18px 28px;
    border-radius: 28px;
  }

  h1 {
    font-size: 26px;
    margin-bottom: 16px;
  }

  p {
    font-size: 17px;
    margin-bottom: 30px;
  }

  input {
    padding: 17px 14px;
    margin-bottom: 38px;
    border-radius: 18px;
  }

  .preview-area {
    max-width: 100%;
    margin-bottom: 38px;
  }

  #setaEsquerda,
  #setaDireita {
    font-size: 52px;
  }

  #setaEsquerda {
    left: -22px;
  }

  #setaDireita {
    right: -22px;
  }

  button.download {
    padding: 18px;
    font-size: 17px;
    border-radius: 18px;
  }
}
</style>
</head>

<body>

<div class="page">
  <div class="container">

    <h1>Moldura JEAS Oficial</h1>
    <p>Envie sua foto, arraste para ajustar e baixe</p>

    <input type="file" id="upload" accept="image/*">

    <div class="preview-area">
      <canvas id="canvasQuadradoPreview" width="1080" height="1080"></canvas>

      <button id="setaEsquerda" type="button">‹</button>

      <canvas id="canvasPreview" width="1080" height="1080"></canvas>

      <button id="setaDireita" type="button">›</button>
    </div>

    <canvas id="canvasFinal" width="1080" height="1080"></canvas>

    <button class="download" onclick="baixarImagem()">
      Baixar imagem
    </button>

  </div>
</div>

<script>
const upload = document.getElementById("upload");

const canvasPreview = document.getElementById("canvasPreview");
const ctxPreview = canvasPreview.getContext("2d");

const canvasQuadradoPreview = document.getElementById("canvasQuadradoPreview");
const ctxQuadradoPreview = canvasQuadradoPreview.getContext("2d");

const canvasFinal = document.getElementById("canvasFinal");
const ctxFinal = canvasFinal.getContext("2d");

const setaEsquerda = document.getElementById("setaEsquerda");
const setaDireita = document.getElementById("setaDireita");

const molduras = [
  "moldura1.png",
  "moldura2.png",
  "moldura3.png"
];

let indiceMoldura = 0;

const moldura = new Image();
moldura.src = molduras[indiceMoldura];

let fotoUsuario = null;

let escala = 1;
let posX = 0;
let posY = 0;

let arrastando = false;
let inicioX = 0;
let inicioY = 0;

moldura.onload = function () {
  desenharTudo();
};

function trocarMoldura(direcao) {
  indiceMoldura += direcao;

  if (indiceMoldura < 0) {
    indiceMoldura = molduras.length - 1;
  }

  if (indiceMoldura >= molduras.length) {
    indiceMoldura = 0;
  }

  moldura.src = molduras[indiceMoldura];
}

setaEsquerda.addEventListener("click", function () {
  trocarMoldura(-1);
});

setaDireita.addEventListener("click", function () {
  trocarMoldura(1);
});

upload.addEventListener("change", function (event) {
  const arquivo = event.target.files[0];

  if (!arquivo) return;

  const reader = new FileReader();

  reader.onload = function (e) {
    fotoUsuario = new Image();

    fotoUsuario.onload = function () {
      escala = Math.max(
        1080 / fotoUsuario.width,
        1080 / fotoUsuario.height
      );

      posX = (1080 - fotoUsuario.width * escala) / 2;
      posY = (1080 - fotoUsuario.height * escala) / 2;

      desenharTudo();
    };

    fotoUsuario.src = e.target.result;
  };

  reader.readAsDataURL(arquivo);
});

function desenharTudo() {
  desenhar(ctxFinal, false);
  desenhar(ctxQuadradoPreview, false);
  desenhar(ctxPreview, true);
}

function desenhar(ctx, redondo) {
  ctx.clearRect(0, 0, 1080, 1080);

  if (redondo) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(540, 540, 540, 0, Math.PI * 2);
    ctx.clip();
  }

  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, 1080, 1080);

  if (fotoUsuario) {
    ctx.save();
    ctx.filter = "blur(35px)";
    ctx.globalAlpha = 0.75;

    const escalaFundo = Math.max(
      1080 / fotoUsuario.width,
      1080 / fotoUsuario.height
    ) * 1.2;

    const larguraFundo = fotoUsuario.width * escalaFundo;
    const alturaFundo = fotoUsuario.height * escalaFundo;

    const fundoX = (1080 - larguraFundo) / 2;
    const fundoY = (1080 - alturaFundo) / 2;

    ctx.drawImage(
      fotoUsuario,
      fundoX,
      fundoY,
      larguraFundo,
      alturaFundo
    );

    ctx.restore();

    ctx.drawImage(
      fotoUsuario,
      posX,
      posY,
      fotoUsuario.width * escala,
      fotoUsuario.height * escala
    );
  }

  ctx.drawImage(moldura, 0, 0, 1080, 1080);

  if (redondo) {
    ctx.restore();
  }
}

function pegarPosicao(event) {
  const rect = canvasPreview.getBoundingClientRect();

  if (event.touches) {
    return {
      x: (event.touches[0].clientX - rect.left) * (1080 / rect.width),
      y: (event.touches[0].clientY - rect.top) * (1080 / rect.height)
    };
  }

  return {
    x: (event.clientX - rect.left) * (1080 / rect.width),
    y: (event.clientY - rect.top) * (1080 / rect.height)
  };
}

function iniciarArraste(event) {
  if (!fotoUsuario) return;

  arrastando = true;

  const pos = pegarPosicao(event);

  inicioX = pos.x - posX;
  inicioY = pos.y - posY;

  canvasPreview.style.cursor = "grabbing";
}

function moverFoto(event) {
  if (!arrastando || !fotoUsuario) return;

  event.preventDefault();

  const pos = pegarPosicao(event);

  posX = pos.x - inicioX;
  posY = pos.y - inicioY;

  desenharTudo();
}

function pararArraste() {
  arrastando = false;
  canvasPreview.style.cursor = "grab";
}

canvasPreview.addEventListener("mousedown", iniciarArraste);
canvasPreview.addEventListener("mousemove", moverFoto);
canvasPreview.addEventListener("mouseup", pararArraste);
canvasPreview.addEventListener("mouseleave", pararArraste);

canvasPreview.addEventListener("touchstart", iniciarArraste);
canvasPreview.addEventListener("touchmove", moverFoto);
canvasPreview.addEventListener("touchend", pararArraste);

function baixarImagem() {
  const imagemFinal = canvasFinal.toDataURL("image/jpeg", 0.95);

  const iphone = /iPhone|iPad|iPod/i.test(navigator.userAgent);

  if (iphone) {
    const novaAba = window.open("", "_blank");

    const img = novaAba.document.createElement("img");
    img.src = imagemFinal;
    img.style.maxWidth = "100%";

    novaAba.document.body.style.margin = "0";
    novaAba.document.body.style.background = "#000";
    novaAba.document.body.appendChild(img);
  } else {
    const link = document.createElement("a");
    link.download = "foto-com-moldura.jpg";
    link.href = imagemFinal;
    link.click();
  }
}
</script>

</body>
</html>
